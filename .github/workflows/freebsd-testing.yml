name: Test on FreeBSD
on:
  workflow_dispatch:
    inputs:
      arch:
        required: true
        type: string
        default: x86_64
      release:
        required: true
        type: string
        default: 15.0
jobs:
  test:
    runs-on: ${{ inputs.arch == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
      - name: Start VM
        id: vm
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636
        with:
          sync: nfs
          arch: ${{ inputs.arch }}
          release: ${{ inputs.release }}
      - name: Setup VS Code dark mode settings
        run: |
          mkdir -p ~/.vscode-server/data/Machine
          echo '{"workbench.colorTheme": "Default Dark Modern"}' > ~/.vscode-server/data/Machine/settings.json
      - uses: fawazahmed0/action-debug-vscode@b86399d1033aab18cf8f962fc7f634f39c9945ec
